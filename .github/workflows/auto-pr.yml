name: Auto Create Draft PR

on:
  push:
    branches: [dev]

jobs:
  create-pr:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[skip cd]') &&
      !contains(github.event.head_commit.message, '[skip cicd]')
    permissions:
      pull-requests: write
      contents: read
    env:
      AI_TITLE_TIMEOUT_MS: '120000'
    outputs:
      pr_number: ${{ steps.create-or-update.outputs.pr_number }}
      pr_title: ${{ steps.create-or-update.outputs.pr_title }}
      pr_body: ${{ steps.create-or-update.outputs.pr_body }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Draft PR to master
        id: create-or-update
        timeout-minutes: 10
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:dev`,
              base: 'master',
              state: 'open',
            });

            const existingPr = prs.length > 0 ? prs[0] : null;

            const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
              owner: context.repo.owner,
              repo: context.repo.repo,
              basehead: 'master...dev',
            });

            const commitList = comparison.commits
              .map(c => `- ${c.commit.message.split('\n')[0]} (${c.sha.slice(0, 7)})`)
              .reverse()
              .join('\n');

            const commitSubjects = comparison.commits.map(c => c.commit.message.split('\n')[0]);
            const commitMessages = commitSubjects.slice(-20).join('\n');
            const titleTimeoutMs = Number(process.env.AI_TITLE_TIMEOUT_MS || 120000);
            const baseUrl = (process.env.OPENAI_BASE_URL || 'https://api.openai.com').replace(/\/$/, '');
            const truncateForLog = (value, maxLength = 400) => {
              const text = String(value ?? '');
              return text.length > maxLength
                ? `${text.slice(0, maxLength)}… [truncated ${text.length - maxLength} chars]`
                : text;
            };
            const parseAiPayload = (raw) => {
              const text = String(raw || '').trim();
              if (!text) {
                throw new Error('Empty AI response body');
              }

              try {
                return JSON.parse(text);
              } catch {
                const ssePayloads = text
                  .split(/\r?\n/)
                  .map(line => line.trim())
                  .filter(line => line.startsWith('data:'))
                  .map(line => line.slice(5).trim())
                  .filter(line => line && line !== '[DONE]');

                for (let index = ssePayloads.length - 1; index >= 0; index -= 1) {
                  try {
                    return JSON.parse(ssePayloads[index]);
                  } catch {
                    // Continue until a valid JSON payload is found.
                  }
                }

                throw new Error(`AI response was not valid JSON: ${text.slice(0, 500)}`);
              }
            };
            const extractAiTitle = (payload) => {
              const choiceContent = payload?.choices?.[0]?.message?.content;
              if (typeof choiceContent === 'string') {
                return choiceContent;
              }

              if (Array.isArray(choiceContent)) {
                return choiceContent
                  .map(item => item?.text || item?.content || '')
                  .join('');
              }

              if (typeof payload?.output_text === 'string') {
                return payload.output_text;
              }

              const responseText = payload?.output
                ?.flatMap(item => item?.content || [])
                ?.map(item => item?.text || '')
                ?.join('');

              return typeof responseText === 'string' ? responseText : '';
            };
            let aiTitle = '';
            if (!existingPr && process.env.OPENAI_API_KEY && process.env.OPENAI_MODEL) {
              try {
                const requestPayload = {
                  model: process.env.OPENAI_MODEL,
                  messages: [
                    {
                      role: 'system',
                      content: 'You are a PR title generator. Given commit messages, generate a PR title following Conventional Commits format: "type(scope): description".\n\nTypes: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert\nScope: optional, e.g., staticSite, ui, content, i18n\n\nReturn ONLY the title text, no quotes or explanation.',
                    },
                    {
                      role: 'user',
                      content: `Commits:\n${commitMessages}`,
                    },
                  ],
                  temperature: 0.3,
                  stream: false,
                };
                const requestPayloadForLog = {
                  ...requestPayload,
                  messages: requestPayload.messages.map(message => ({
                    ...message,
                    content: truncateForLog(message.content),
                  })),
                };
                console.log('AI title request payload:', JSON.stringify(requestPayloadForLog, null, 2));

                const aiResponse = await fetch(`${baseUrl}/v1/chat/completions`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                  },
                  body: JSON.stringify(requestPayload),
                  signal: AbortSignal.timeout(titleTimeoutMs),
                });

                const raw = await aiResponse.text();
                if (!aiResponse.ok) {
                  throw new Error(`API request failed: ${aiResponse.status} ${aiResponse.statusText} - ${raw.slice(0, 500)}`);
                }

                const json = parseAiPayload(raw);
                aiTitle = String(extractAiTitle(json) || '').trim();
                aiTitle = aiTitle.replace(/^['"`]+|['"`]+$/g, '').trim();

                if (!aiTitle) {
                  throw new Error('No title content returned from AI');
                }
              } catch (error) {
                console.log('Failed to generate AI title:', error.message);
              }
            } else if (existingPr) {
              console.log(`Skipping AI title generation because PR #${existingPr.number} already exists.`);
            } else {
              console.log('Skipping AI title generation because OPENAI_API_KEY or OPENAI_MODEL is missing.');
            }

            const date = new Date(Date.now() + 8 * 60 * 60 * 1000).toISOString().slice(0, 19).replace('T', ' ');
            const fallbackTitle = `[StaticSite] Merge dev → master (${date} UTC+8)`;
            const title = existingPr?.title || aiTitle || fallbackTitle;

            const body = [
              '## StaticSite Changes',
              '',
              'This PR was automatically created when changes were pushed to `dev`.',
              '',
              `### Commits (${comparison.ahead_by} ahead of master)`,
              '',
              commitList || '_No new commits._',
            ].join('\n');

            if (comparison.ahead_by === 0) {
              console.log('dev is up to date with master, skipping PR creation.');
              return;
            }

            let prNumber;
            if (existingPr) {
              prNumber = existingPr.number;
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                title,
                body,
              });
              console.log(`Updated body of PR #${prNumber}: ${existingPr.html_url}`);
              core.setOutput('pr_number', prNumber);
              core.setOutput('pr_title', title);
              core.setOutput('pr_body', body);
            } else {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                head: 'dev',
                base: 'master',
                body,
                draft: true,
              });
              prNumber = pr.number;
              console.log(`Created draft PR #${prNumber}: ${pr.html_url}`);
              core.setOutput('pr_number', prNumber);
              core.setOutput('pr_title', title);
              core.setOutput('pr_body', body);
            }
